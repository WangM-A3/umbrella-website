<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 培训助教</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e27;color:#fff;height:100vh;display:flex;flex-direction:column}
.header{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.header h1{font-size:15px;font-weight:600;flex:1}
.header .badge{font-size:10px;padding:2px 8px;background:rgba(0,240,255,.15);color:#00f0ff;border-radius:6px}
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;animation:fadeIn .3s}
.msg.user{background:#00f0ff;color:#000;align-self:flex-end;border-bottom-right-radius:4px}
.msg.ai{background:rgba(255,255,255,.08);align-self:flex-start;border-bottom-left-radius:4px;color:#ccc}
.msg.ai strong{color:#00f0ff}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing{display:flex;gap:4px;padding:10px 14px}
.typing span{width:6px;height:6px;background:#00f0ff;border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);display:flex;gap:8px}
.input-area input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#fff;font-size:13px;outline:none}
.input-area input:focus{border-color:#00f0ff}
.input-area button{padding:10px 20px;border-radius:20px;border:none;background:linear-gradient(135deg,#00f0ff,#7b2fbe);color:#000;font-weight:600;font-size:13px;cursor:pointer;transition:opacity .2s}
.input-area button:hover{opacity:.85}
.suggestions{padding:8px 16px 0;display:flex;gap:6px;flex-wrap:wrap}
.suggestions button{padding:4px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#888;font-size:11px;cursor:pointer;transition:all .2s}
.suggestions button:hover{border-color:#00f0ff;color:#00f0ff}
</style>
</head>
<body>
<div class="header">
  <span style="font-size:20px">🤖</span>
  <h1>AI 培训助教</h1>
  <span class="badge">DeepSeek</span>
</div>
<div class="suggestions">
  <button onclick="ask('AI选品有什么优势？')">AI选品优势</button>
  <button onclick="ask('AIGC内容生成怎么做？')">AIGC怎么做</button>
  <button onclick="ask('跨境电商新手从哪里开始用AI？')">新手入门</button>
</div>
<div class="chat-area" id="chatArea">
  <div class="msg ai">你好！我是你的AI培训助教，专攻AI在跨境电商中的应用。你可以问我关于选品、内容生成、营销、客服、供应链、数据分析等方面的问题。试试点上面的快捷提问，或者直接打字问我！</div>
</div>
<div class="input-area">
  <input id="input" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">发送</button>
</div>
<script>
const API = '/api/ai/tutor';
let history = [];

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text.replace(/\n/g, '<br>');
  document.getElementById('chatArea').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('chatArea').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function ask(q) {
  document.getElementById('input').value = q;
  send();
}

async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg('user', msg);
  history.push({role:'user', content:msg});
  showTyping();
  try {
    const r = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: msg, history: history.slice(-10)})
    });
    const data = await r.json();
    hideTyping();
    addMsg('ai', data.reply || '(无回复)');
    history.push({role:'assistant', content: data.reply || ''});
  } catch(e) {
    hideTyping();
    addMsg('ai', 'AI服务暂时不可用，请稍后再试。<br><small>错误: ' + e.message + '</small>');
  }
}
</script>
</body>
</html>
