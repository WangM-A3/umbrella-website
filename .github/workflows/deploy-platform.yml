 name: 部署 Platform Kernel
 on:
   push:
     branches: [main]
     paths:
       - "platform-kernel/**"
       - "trade_engine/**"
       - "Dockerfile"
       - "main.py"
   workflow_dispatch:
   workflow_call:
 jobs:
   deploy:
     runs-on: ubuntu-latest
     steps:
       - uses: actions/checkout@v4
       - name: 构建 Docker 镜像
         run: |
           docker build -t platform-kernel:latest \
             -f platform-kernel/Dockerfile .
       - name: 登录 Docker Hub
         uses: docker/login-action@v3
         with:
           username: ${{ secrets.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD }}
       - name: 推送镜像到 Docker Hub
         run: |
           docker tag platform-kernel:latest \
             ${{ secrets.DOCKER_USERNAME }}/platform-kernel:latest
           docker push ${{ secrets.DOCKER_USERNAME }}/platform-kernel:latest
       - name: 部署到 VPS
         uses: appleboy/ssh-action@v1.2.0
         with:
           host: ${{ secrets.VPS_HOST }}
           username: ${{ secrets.VPS_USERNAME }}
           key: ${{ secrets.VPS_SSH_KEY }}
           script: |
             docker pull ${{ secrets.DOCKER_USERNAME }}/platform-kernel:latest
             docker stop platform-kernel || true
             docker rm platform-kernel || true
             docker run -d --name platform-kernel \
               -p 8000:8000 \
               -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
               --restart unless-stopped \
               ${{ secrets.DOCKER_USERNAME }}/platform-kernel:latest
